[colors]
background = #0f0f0f
background-alt = #373B41
foreground = #d7d3b4
primary = #b0b0b0
secondary = #8ABEB7
alert = #A54242
disabled = #707880
bt = #1b1b1c

[bar/example]
width = 1366px
height = 18px

; dpi = 91

background = ${colors.background}
#background = #00000000
foreground = ${colors.foreground}

line-size = 5pt

border-size = 3pt
border-color = ${colors.background}
#border-color = #00000000

padding-left = 0
padding-right = 0

;module-margin = 1

font-0 = JetBrains Mono:style=SemiBold:size=10;3
font-1 = JetBrainsMonoNL Nerd Font Mono:style=SemiBold:size=10;3
font-2 = JetBrainsMonoNL Nerd Font Mono:style=SemiBold:size=18;5

modules-center = round-left bspwm round-right
modules-left = round-left date round-right
modules-right = round-left mlayout tempi mtemp spaci mbattery wifii mwifi round-right

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

override-redirect = false
;wm-restack = generic
wm-restack = bspwm

bottom = true

[module/bspwm]
type = internal/bspwm

pin-workspaces = true
format-background = ${colors.bt}

label-active = "в—Ҹ"
label-active-foreground = ${colors.primary}
# label-active-underline= ${colors.primary}
label-active-padding = 1

label-unoccupied = "в—Ӣ"
label-unoccupied-foreground = ${colors.primary}
label-unoccupied-padding = 1

label-occupied = "в—Ҹ"
label-occupied-foreground = #5d5d5d
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = "в—Ӣ"
label-empty-foreground = #4c4c4c
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:8:..%
label-background = ${colors.bt}

[module/space]
type = custom/text
label = " "

[module/pulseaudio]
type = internal/pulseaudio 

format-volume-prefix = "у°•ҫ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

format-muted = <label-muted>
label-muted = "у°қҹ"
label-muted-foreground = ${colors.disabled}


[module/date]
type = internal/date
interval = 1

date = в Җ%a %d %H:%M%
date-alt = %a %b %d %H:%M:%S
format = <label>
format-foreground = ${colors.foregound}
label = %date%
format-background = ${colors.bt}

[module/round-left]
type = custom/text
content = оӮ¶
content-foreground = ${colors.bt}
content-font = 2

[module/round-right]
type = custom/text
content = оӮҙ
content-foreground = ${colors.bt}
content-font = 2

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/mlayout]
type = custom/script
exec = /home/snchart/modulelayout.sh
interval = 1
format-background = ${colors.bt}

[module/mtemp]
type = custom/script
exec = /home/snchart/moduletemp.sh
interval = 4
format-background = ${colors.bt}

[module/tempi]
type = custom/text
content = "п’ј"
content-padding = 1
content-font = 3
content-background = ${colors.bt}

[module/mbattery]
type = custom/script
exec = /home/snchart/modulebattery.sh
interval = 2
format-background = ${colors.bt}

[module/spaci]
type = custom/text
content = "  "
content-background = ${colors.bt}

[module/mwifi]
type = custom/script
exec = /home/snchart/modulewifi.sh
interval = 10
format-background = ${colors.bt}

[module/wifii]
type = custom/text
content = "у°ӨҘ"
content-padding = 1
content-font = 3
content-background = ${colors.bt}

; vim:ft=dosini
